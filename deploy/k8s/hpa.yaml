# Scale on queue depth, not CPU. `num_requests_waiting` is the signal that a replica is
# saturated and traffic is backing up. Requires a custom-metrics adapter (e.g. prometheus-adapter)
# exposing vllm:num_requests_waiting as a pods metric.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-inference
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Pods
      pods:
        metric:
          name: vllm_num_requests_waiting
        target:
          type: AverageValue
          averageValue: "5"          # scale up when avg queued requests/replica exceeds 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - { type: Pods, value: 2, periodSeconds: 60 }
    scaleDown:
      # GPU pods are expensive to churn; scale down slowly.
      stabilizationWindowSeconds: 300
      policies:
        - { type: Pods, value: 1, periodSeconds: 120 }
