name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync env (dev extras only — vLLM not needed for unit tests)
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Unit tests
        # Smoke tests self-skip without a live server; config tests run here.
        run: uv run pytest
